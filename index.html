<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ochiq Byudjet — Қўшкўпир тумани</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-dim: rgba(63,185,80,0.12);
      --green-border: rgba(63,185,80,0.35);
      --red: #f85149;
      --red-dim: rgba(248,81,73,0.12);
      --red-border: rgba(248,81,73,0.35);
      --blue: #58a6ff;
      --gold: #d29922;
      --gold-dim: rgba(210,153,34,0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 8px;
    }
    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 800;
      line-height: 1.25;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ── Budget summary card ── */
    .budget-card {
      background: linear-gradient(135deg, #1c2128 0%, #161b22 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) {
      .budget-card { grid-template-columns: 1fr 1fr; }
      .budget-card .stat:last-child { grid-column: 1 / -1; }
    }
    .stat { text-align: center; }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 700;
    }
    .stat-value.blue { color: var(--blue); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold { color: var(--gold); }

    /* ── Section tabs ── */
    .section-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .2s, border-color .2s;
    }
    .tab.winner {
      background: var(--green-dim);
      border-color: var(--green-border);
      color: var(--green);
    }
    .tab.loser {
      background: var(--red-dim);
      border-color: var(--red-border);
      color: var(--red);
    }
    .tab .count {
      background: rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 11px;
    }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* ── Initiative card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: fadeUp .35s ease both;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(0,0,0,.45);
    }
    .card.winner:hover { border-color: var(--green-border); }
    .card.loser:hover  { border-color: var(--red-border); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* left accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 3px;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .card.winner::before { background: linear-gradient(180deg, var(--green), rgba(63,185,80,0.2)); }
    .card.loser::before  { background: linear-gradient(180deg, var(--red),   rgba(248,81,73,0.2)); }

    /* ── Top row: rank + name + symbol ── */
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-left: 6px;
    }

    .rank {
      flex-shrink: 0;
      min-width: 28px;
      height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .card.winner .rank { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .card.loser  .rank { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }

    .quarter {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-symbol {
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ── District & category ── */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .district {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .dot { color: var(--border); font-size: 11px; }

    .category-chip {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      color: var(--muted);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Bottom row: amount left + votes right ── */
    .card-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-left: 6px;
      gap: 8px;
    }

    .amount-block .amount-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 1px;
    }
    .amount-block .amount-val {
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
    }
    .amount-val.green { color: var(--green); }
    .amount-val.red   { color: var(--red); }

    .vote-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .card.winner .vote-pill { background: rgba(88,166,255,.1); color: var(--blue); border: 1px solid rgba(88,166,255,.25); }
    .card.loser  .vote-pill { background: rgba(139,148,158,.08); color: var(--muted); border: 1px solid var(--border); }
    .vote-pill .thumb { font-size: 13px; }

    /* vote bar */
    .vote-bar-wrap { margin-top: 10px; padding-left: 6px; }
    .vote-bar-bg {
      height: 3px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }
    .vote-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 1s ease;
    }
    .card.winner .vote-bar-fill { background: linear-gradient(90deg, var(--green), #1f6feb); }
    .card.loser  .vote-bar-fill { background: var(--red); }

    /* ── Section label ── */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 20px 0 12px;
    }
    .section-label span { flex: 1; height: 1px; background: var(--border); }

    /* ── Loader / Error ── */
    .loader {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }
    .loader .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
      font-size: 13px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 28px;
      padding-bottom: 16px;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    /* ── Remaining budget bar ── */
    .budget-progress {
      margin-top: 14px;
    }
    .budget-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .budget-progress-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }
    .budget-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green) 0%, #1f6feb 100%);
      transition: width 1.2s ease;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loader">
    <div class="spinner"></div>
    <p>Ma'lumotlar yuklanmoqda…</p>
  </div>
</div>

<script>
const BUDGET_URL  = '/api/budget';
const BOARD_URL   = '/api/board';

function fmt(n) {
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + ' млрд';
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(1) + ' млн';
  return n.toLocaleString('ru-RU');
}
function fmtFull(n) {
  return n.toLocaleString('ru-RU') + ' сўм';
}

async function load() {
  const [budgetRes, boardRes] = await Promise.all([
    fetch(BUDGET_URL),
    fetch(BOARD_URL)
  ]);
  const budget = await budgetRes.json();
  const board  = await boardRes.json();
  return { budget, initiatives: board.content };
}

function classify(initiatives, budgetSum) {
  let cum = 0;
  return initiatives.map(item => {
    const fits = (cum + item.grantedAmount) <= budgetSum;
    if (fits) cum += item.grantedAmount;
    return { ...item, winner: fits, cumulative: fits ? cum : null };
  });
}

function render({ budget, initiatives }) {
  const { budgetSum, debtSum } = budget;
  const classified = classify(initiatives, budgetSum);
  const winners = classified.filter(i => i.winner);
  const losers  = classified.filter(i => !i.winner);
  const totalGranted = winners.reduce((a, b) => a + b.grantedAmount, 0);
  const remaining = budgetSum - totalGranted;
  const usedPct = Math.min(100, (totalGranted / budgetSum) * 100);
  const maxVotes = classified[0]?.voteCount || 1;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="badge">🏛 Ochiq Byudjet</div>
      <h1>Қўшкўпир тумани<br/>Бюджет ташаббуслари</h1>
      <p>Bosqich: PASSED · Sahifa: 1/12</p>
    </div>

    <div class="budget-card">
      <div class="stat">
        <div class="stat-label">Umumiy byudjet</div>
        <div class="stat-value blue">${fmt(budgetSum)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ajratildi</div>
        <div class="stat-value green">${fmt(totalGranted)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Qoldiq</div>
        <div class="stat-value gold">${fmt(remaining)}</div>
      </div>
      <div class="stat" style="grid-column:1/-1">
        <div class="budget-progress">
          <div class="budget-progress-label">
            <span>Budjet sarfi</span>
            <span>${usedPct.toFixed(1)}%</span>
          </div>
          <div class="budget-progress-bar">
            <div class="budget-progress-fill" style="width:${usedPct}%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-tabs">
      <div class="tab winner">
        <span>🏆 G'oliblar</span>
        <span class="count">${winners.length}</span>
      </div>
      <div class="tab loser">
        <span>❌ Mag'lublar</span>
        <span class="count">${losers.length}</span>
      </div>
    </div>

    <div class="section-label">
      <span></span>
      🏆 G'olib ташаббуслар
      <span></span>
    </div>
    <div class="grid" id="winners-grid"></div>

    <div class="section-label">
      <span></span>
      ❌ Маблағ етмаган ташаббуслар
      <span></span>
    </div>
    <div class="grid" id="losers-grid"></div>

    <div class="footer">
      Ma'lumot manba'i: <a href="https://openbudget.uz" target="_blank">openbudget.uz</a>
    </div>
  `;

  function shortCategory(name) {
    const words = name.trim().split(/\s+/);
    return words.slice(0, 2).join(' ') + (words.length > 2 ? '…' : '');
  }

  function cardHTML(item, rank) {
    const cls = item.winner ? 'winner' : 'loser';
    const symbol = item.winner ? '🏆' : '❌';
    const pct = Math.round((item.voteCount / maxVotes) * 100);
    const amtColor = item.winner ? 'green' : 'red';
    const shortCat = shortCategory(item.categoryName);
    return `
      <div class="card ${cls}" style="animation-delay:${rank * 0.04}s">

        <!-- Top row: rank pill · name · status symbol -->
        <div class="card-top">
          <span class="rank">#${rank + 1}</span>
          <span class="quarter">${item.quarterName}</span>
          <span class="status-symbol">${symbol}</span>
        </div>

        <!-- Meta: district · short category -->
        <div class="card-meta">
          <span class="district">${item.districtName}</span>
          <span class="dot">·</span>
          <span class="district" title="${item.categoryName}">${shortCat}</span>
        </div>

        <!-- Bottom row: amount (left) · votes pill (right) -->
        <div class="card-bottom">
          <div class="amount-block">
            <div class="amount-val ${amtColor}">${fmt(item.grantedAmount)}</div>
          </div>
          <div class="vote-pill">
            <span class="thumb">👍</span>
            ${item.voteCount.toLocaleString('ru-RU')}
          </div>
        </div>

        <!-- Thin progress bar -->
        <div class="vote-bar-wrap">
          <div class="vote-bar-bg">
            <div class="vote-bar-fill" style="width:0%" data-pct="${pct}"></div>
          </div>
        </div>

      </div>
    `;
  }

  document.getElementById('winners-grid').innerHTML = winners.map((item, i) => cardHTML(item, i)).join('');
  document.getElementById('losers-grid').innerHTML  = losers.map((item, i) => cardHTML(item, winners.length + i)).join('');

  // Animate bars after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.vote-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);
  });
}

(async () => {
  try {
    const data = await load();
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="header"><div class="badge">🏛 Ochiq Byudjet</div><h1>Қўшкўпир тумани</h1></div>
      <div class="error-box">⚠️ Ma'lumotlarni yuklashda xatolik yuz berdi.<br><small>${e.message}</small></div>
    `;
  }
})();
</script>
</body>
</html>
